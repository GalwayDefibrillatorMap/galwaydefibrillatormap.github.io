<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galway Defibrillator Map</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        header {
            background: #7B1F34;
            color: #fff;
            text-align: center;
            padding: 14px 20px;
            font-size: 1.1rem;
            letter-spacing: .5px;
        }

        #content {
            display: flex;
            height: calc(100vh - 52px);
        }

        #map {
            flex: 1;
            height: 100%;
        }

        #directions-panel {
            display: none;
            width: 340px;
            height: 100%;
            overflow-y: auto;
            background: #fff;
            border-left: 1px solid #dadce0;
            font-size: 13px;
            color: #333;
        }
        #directions-panel .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: #7B1F34;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        #directions-panel .panel-header h2 {
            font-size: 15px;
            margin: 0;
        }
        #directions-panel .panel-header button {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
        }
        #directions-panel .summary {
            padding: 10px 14px;
            background: #f5e6ea;
            font-weight: 600;
            border-bottom: 1px solid #dadce0;
        }
        #directions-panel .adp-directions {
            padding: 0;
        }
        /* Clean up Google's default directions table styling */
        #directions-panel table {
            width: 100%;
            font-size: 13px;
        }
        #directions-panel td {
            padding: 8px 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* InfoWindow styling */
        .info-window {
            max-width: 260px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .info-window img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .info-window h3 {
            margin: 0 0 4px;
            font-size: 15px;
            color: #7B1F34;
        }
        .info-window p {
            margin: 0;
            font-size: 13px;
            color: #444;
            line-height: 1.4;
        }
        .info-window .directions-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }
        .info-window .directions-btn:hover {
            background: #1558b0;
        }
        .info-window .navigate-btn {
            display: inline-block;
            margin-top: 8px;
            margin-left: 4px;
            padding: 6px 14px;
            background: #0d904f;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }
        .info-window .navigate-btn:hover {
            background: #0b7a42;
        }
    </style>
</head>
<body>

    <header>
        <h1>Galway Defibrillator Map</h1>
    </header>

    <div id="content">
        <div id="map"></div>
        <div id="directions-panel">
            <div class="panel-header">
                <h2>🧭 Directions</h2>
                <button onclick="clearRoute()" title="Close">✕</button>
            </div>
            <div class="summary" id="directions-summary"></div>
            <div id="directions-steps"></div>
        </div>
    </div>

    <script>
        /* ──────────────────────────────────────────────
         *  DEFIBRILLATOR DATA -  
         *  Add more entries to this array to add markers.
         * ────────────────────────────────────────────── */
        const defibrillators = [
            {
                lat: 53.2745,
                lng: -9.0492,
                title: "Eyre Square Defibrillator",
                description: "Located at the main entrance of Eyre Square Shopping Centre. Available 24/7.",
                image: "1708426446965.jpeg"
            },
            {
                lat: 53.2707,
                lng: -9.0568,
                title: "Spanish Arch Defibrillator",
                description: "Wall-mounted unit beside the Spanish Arch, near the Galway City Museum entrance.",
                image: "1708426446965.jpeg"
            },
            {
                lat: 53.2812,
                lng: -9.0625,
                title: "NUIG Campus Defibrillator",
                description: "Inside the main foyer of the Áras na Mac Léinn (Student Centre), University of Galway.",
                image: "1708426446965.jpeg"
            }
        ];

        /* ──────────────────────────────────────────────
         *  INITIALISE THE MAP
         * ────────────────────────────────────────────── */
        // Global so the directions button and clear button can access them
        let userPosition = null;
        let directionsRenderer = null;

        function clearRoute() {
            if (directionsRenderer) {
                directionsRenderer.setMap(null);
                directionsRenderer = null;
            }
            document.getElementById('directions-panel').style.display = 'none';
            document.getElementById('directions-summary').textContent = '';
            document.getElementById('directions-steps').innerHTML = '';
        }

        function getDirections(destLat, destLng, map) {
            if (!userPosition) {
                alert('Your location is not available. Please allow location access and reload the page.');
                return;
            }

            // Clear any previous route
            clearRoute();

            const directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false,
                polylineOptions: { strokeColor: '#1a73e8', strokeWeight: 5 },
                panel: document.getElementById('directions-steps')
            });

            directionsService.route(
                {
                    origin: userPosition,
                    destination: { lat: destLat, lng: destLng },
                    travelMode: google.maps.TravelMode.WALKING
                },
                (result, status) => {
                    if (status === 'OK') {
                        directionsRenderer.setDirections(result);

                        // Show summary (distance + duration)
                        const leg = result.routes[0].legs[0];
                        document.getElementById('directions-summary').textContent =
                            `🚶 ${leg.distance.text}  •  ⏱ ${leg.duration.text}`;

                        // Show panel
                        document.getElementById('directions-panel').style.display = 'block';
                    } else {
                        alert('Could not get directions: ' + status);
                    }
                }
            );
        }

        function startNavigation(destLat, destLng) {
            // Opens Google Maps app (on phone) or web (on desktop)
            // with walking directions and live GPS navigation
            const url = `https://www.google.com/maps/dir/?api=1&destination=${destLat},${destLng}&travelmode=walking`;
            window.open(url, '_blank');
        }

        function initMap() {
            const galway = { lat: 53.2745, lng: -9.0492 };

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: galway,
                mapTypeControl: true,
                streetViewControl: false
            });

            // Make map accessible to global getDirections function
            window._map = map;

            // Only one InfoWindow open at a time
            const infoWindow = new google.maps.InfoWindow();

            // SVG heart with ECG heartbeat line (defibrillator style)
            const heartSvg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="52" height="62" viewBox="-2 -2 52 62">
                    <defs>
                        <filter id="shadow" x="-30%" y="-20%" width="160%" height="160%">
                            <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
                        </filter>
                    </defs>
                    <g filter="url(#shadow)">
                        <!-- Classic heart shape -->
                        <path d="M24 44 C14 36, 4 28, 4 18 C4 11, 9 5, 15 5
                                 C18.5 5, 21.5 7, 24 11 C26.5 7, 29.5 5, 33 5
                                 C39 5, 44 11, 44 18 C44 28, 34 36, 24 44Z"
                              fill="#C62828" stroke="#8E0000" stroke-width="1.2"/>
                        <!-- Subtle highlight -->
                        <ellipse cx="15" cy="17" rx="5" ry="6" fill="white" opacity="0.18"/>
                        <!-- ECG / heartbeat line -->
                        <polyline points="8,26 14,26 16,26 18,22 20,32 22,18 24,30 26,22 28,26 30,26 40,26"
                              fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>
                </svg>`;
            const heartIconUrl = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(heartSvg);

            defibrillators.forEach(defib => {
                const marker = new google.maps.Marker({
                    position: { lat: defib.lat, lng: defib.lng },
                    map: map,
                    title: defib.title,
                    icon: {
                        url: heartIconUrl,
                        scaledSize: new google.maps.Size(48, 56),
                        anchor: new google.maps.Point(24, 50)
                    }
                });

                marker.addListener("click", () => {
                    infoWindow.setContent(`
                        <div class="info-window">
                            <img src="${defib.image}" alt="${defib.title}">
                            <h3>${defib.title}</h3>
                            <p>${defib.description}</p>
                            <button class="directions-btn"
                                onclick="getDirections(${defib.lat}, ${defib.lng}, window._map)">
                                🧭 Directions
                            </button>
                            <button class="navigate-btn"
                                onclick="startNavigation(${defib.lat}, ${defib.lng})">
                                📍 Navigate
                            </button>
                        </div>
                    `);
                    infoWindow.open(map, marker);
                });
            });

            /* ──────────────────────────────────────────────
             *  USER LOCATION
             * ────────────────────────────────────────────── */
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userPos = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };

                        // Store globally so directions can use it
                        userPosition = userPos;

                        // Blue dot for the user's location
                        new google.maps.Marker({
                            position: userPos,
                            map: map,
                            title: "Your Location",
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 10,
                                fillColor: "#4285F4",
                                fillOpacity: 1,
                                strokeColor: "#ffffff",
                                strokeWeight: 3
                            },
                            zIndex: 999
                        });

                        // Optional: blue halo to mimic accuracy ring
                        new google.maps.Circle({
                            map: map,
                            center: userPos,
                            radius: position.coords.accuracy,
                            fillColor: "#4285F4",
                            fillOpacity: 0.15,
                            strokeColor: "#4285F4",
                            strokeOpacity: 0.3,
                            strokeWeight: 1
                        });

                        // Pan map to include user location
                        const bounds = new google.maps.LatLngBounds();
                        bounds.extend(userPos);
                        defibrillators.forEach(d => bounds.extend({ lat: d.lat, lng: d.lng }));
                        map.fitBounds(bounds);
                    },
                    (error) => {
                        console.warn("Geolocation failed:", error.message);
                    }
                );
            }
        }
    </script>

    <!--
        IMPORTANT: Replace YOUR_API_KEY below with a valid Google Maps JavaScript API key.
        Get one free at https://console.cloud.google.com/google/maps-apis
    -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&callback=initMap"
        async defer>
    </script>

</body>

</html>
